<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ResqHub</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --resq-blue: #007AFF;
            --resq-gray-light: #f2f2f7;
            --resq-text-muted: #8e8e93;
            --resq-card-bg: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: #ffffff;
            color: #000;
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 40px 0 20px 0;
            text-align: center;
            width: 100%;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .logo span { color: var(--resq-blue); }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
        }

        .app-card {
            background: var(--resq-card-bg);
            border-radius: 28px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .app-card:active { transform: scale(0.95); }

        .app-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .label {
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Resq<span>Hub</span></div>
    </header>

    <div class="grid">
        <a href="resqecg/index.html" class="app-card">
            <img src="resqecg/icon.png" alt="ResqECG" class="app-icon">
            <div class="label">ResqECG</div>
        </a>

        <a href="resqspine/index.html" class="app-card">
            <img src="resqspine/icon.png" alt="ResqSpine" class="app-icon">
            <div class="label">ResqSpine</div>
        </a>

        <a href="resqo2/index.html" class="app-card">
            <img src="resqo2/icon.png" alt="ResqO2" class="app-icon">
            <div class="label">ResqO2</div>
        </a>

        <a href="resqburns/index.html" class="app-card">
            <img src="resqburns/icon.png" alt="ResqBurns" class="app-icon">
            <div class="label">ResqBurns</div>
        </a>
    </div>

</body>
</html>
